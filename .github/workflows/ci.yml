name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov

      - name: Build and run C tests (Unity + legacy)
        env:
          COVERAGE: 1
        run: make clean && make c_tests

      - name: Capture C coverage (lcov)
        run: |
          lcov --capture --directory . --output-file coverage.info
          lcov --remove coverage.info "/usr/*" --output-file coverage.info
          lcov --list coverage.info

      - name: Install package
        run: python -m pip install -e .

      - name: Run Python tests with coverage
        run: |
          pytest --cov=tinymlinference --cov=src/python --cov-report=xml --cov-report=term

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.info
            coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info,coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tiny-ml-runtime .

      - name: Run inference in Docker
        run: docker run --rm tiny-ml-runtime
